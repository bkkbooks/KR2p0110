body:
  text: 散見簡牘合輯敦煌研究院收藏的漢簡右條官牛將轉出入遣宜持魚一枚武威徒王馬入塞今還使入塞今還官前卅人轉官鄯善督使君寧入三百草五錢入二百六十七錢到亟馳詣官史就私死死情何有和所縑一匹月必人支城傳審再拜府君教敦煌長史印元嘉二年九月草日丁酉起
